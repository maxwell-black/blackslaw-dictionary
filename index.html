<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black's Law Dictionary (1910)</title>
    <meta name="description" content="Free searchable Black's Law Dictionary 2nd Edition (1910). 12,000+ legal definitions.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- Mobile Sidebar -->
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Browse A–Z</span>
        </div>
        <div class="sidebar-letters" id="sidebar-letters"></div>
    </aside>

    <div class="content-wrapper">
        <!-- Letter Rail (Hardcoded for instant render) -->
        <nav class="letter-rail" id="letter-rail">
            <button class="letter-btn" data-letter="A">A</button>
            <button class="letter-btn" data-letter="B">B</button>
            <button class="letter-btn" data-letter="C">C</button>
            <button class="letter-btn" data-letter="D">D</button>
            <button class="letter-btn" data-letter="E">E</button>
            <button class="letter-btn" data-letter="F">F</button>
            <button class="letter-btn" data-letter="G">G</button>
            <button class="letter-btn" data-letter="H">H</button>
            <button class="letter-btn" data-letter="I">I</button>
            <button class="letter-btn" data-letter="J">J</button>
            <button class="letter-btn" data-letter="K">K</button>
            <button class="letter-btn" data-letter="L">L</button>
            <button class="letter-btn" data-letter="M">M</button>
            <button class="letter-btn" data-letter="N">N</button>
            <button class="letter-btn" data-letter="O">O</button>
            <button class="letter-btn" data-letter="P">P</button>
            <button class="letter-btn" data-letter="Q">Q</button>
            <button class="letter-btn" data-letter="R">R</button>
            <button class="letter-btn" data-letter="S">S</button>
            <button class="letter-btn" data-letter="T">T</button>
            <button class="letter-btn" data-letter="U">U</button>
            <button class="letter-btn" data-letter="V">V</button>
            <button class="letter-btn" data-letter="W">W</button>
            <button class="letter-btn" data-letter="X">X</button>
            <button class="letter-btn" data-letter="Y">Y</button>
            <button class="letter-btn" data-letter="Z">Z</button>
        </nav>

        <!-- Main Content -->
        <main id="main">
            <div class="reading-col">
                <!-- Header -->
                <header class="site-header">
                    <div class="header-top">
                        <button class="menu-btn" id="menuBtn" aria-label="Open menu">
                            <svg width="20" height="14" viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.5">
                                <line x1="0" y1="1" x2="20" y2="1"/>
                                <line x1="0" y1="7" x2="20" y2="7"/>
                                <line x1="0" y1="13" x2="20" y2="13"/>
                            </svg>
                        </button>
                        <h1 class="book-title">Black's Law Dictionary</h1>
                        <div class="header-controls">
                            <button class="font-btn" id="fontDec" aria-label="Decrease font size">A−</button>
                            <button class="font-btn" id="fontInc" aria-label="Increase font size">A+</button>
                            <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode">
                                <span class="moon">☾</span>
                                <span class="sun">☼</span>
                            </button>
                        </div>
                    </div>
                    <div class="search-wrap">
                        <input type="text" id="search-box" placeholder="Search…" autocomplete="off">
                        <span id="resultCount"></span>
                    </div>
                </header>

                <!-- Loading State (shown immediately) -->
                <div class="loading-state" id="loadingState">
                    <div class="loading-spinner"></div>
                    <p>Loading dictionary...</p>
                </div>

                <!-- Entries Container -->
                <div id="entries-container" style="display: none;">
                    <div id="entries"></div>
                    <div class="sentinel" id="sentinel"></div>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <p>No entries found.</p>
                </div>
                
                <!-- Welcome State -->
                <div class="welcome-state" id="welcomeState">
                    <p>Select a letter from the sidebar to begin browsing</p>
                    <p class="welcome-hint">Or type to search across all entries</p>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
